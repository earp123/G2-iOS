name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Gated to owners/members/collaborators: this runs on a self-hosted
    # runner (your own Mac), so an ungated "@claude" trigger would let
    # anyone who can comment on a public repo execute on your machine.
    # Remove the author_association checks if this repo is private and you
    # don't need the extra gate.
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      )
    # Self-hosted macOS x64 runner (registered from your own Mac) rather
    # than a GitHub-hosted image — labels match what GitHub assigns by
    # default when you register a macOS/x64 runner. Adjust if you used
    # custom labels during registration.
    runs-on: [self-hosted, macOS, X64]
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Sanity check — self-hosted means whatever Xcode is already installed
      # on this Mac is used as-is; no toolchain-selection step needed.
      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Lets Claude invoke the Xcode toolchain (build/test) rather than
          # just read/edit files. Verify this --allowed-tools syntax against
          # https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: '--allowed-tools "Bash(xcodebuild:*)" "Bash(xcrun:*)" "Bash(swift:*)"'

